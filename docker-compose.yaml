services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_TRANSCRIPTION_MODEL: ${GROQ_TRANSCRIPTION_MODEL:-whisper-large-v3-turbo}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_SUMMARY_MODEL: ${MISTRAL_SUMMARY_MODEL:-mistral-small-latest}
      MANGO_VPBX_API_KEY: ${MANGO_VPBX_API_KEY:-}
      MANGO_VPBX_API_SALT: ${MANGO_VPBX_API_SALT:-}
      MANGO_BASE_URL: ${MANGO_BASE_URL:-https://app.mango-office.ru}
    expose:
      - "3000"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_uploads:/app/uploads

  frontend-manager:
    build:
      context: ./frontend-manager
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-frontend-manager
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_BASE_URL: ${VITE_BASE_URL:-http://backend:3000}
      VITE_TIMEOUT: ${VITE_TIMEOUT:-10000}
    expose:
      - "3000"
    ports:
      - "${FRONTEND_MANAGER_PORT:-8080}:3000"

volumes:
  postgres_data:
  backend_uploads:
