services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build:
      context: ./backend
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_BASE_URL=${GROQ_BASE_URL}
      - GROQ_TRANSCRIPTION_MODEL=${GROQ_TRANSCRIPTION_MODEL}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_SUMMARY_MODEL=${MISTRAL_SUMMARY_MODEL}
      - MANGO_VPBX_API_KEY=${MANGO_VPBX_API_KEY}
      - MANGO_VPBX_API_SALT=${MANGO_VPBX_API_SALT}
      - MANGO_BASE_URL=${MANGO_BASE_URL:-https://app.mango-office.ru}

  frontend:
    build:
      context: ./frontend
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
