services:
  caddy:
    image: caddy:2-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend-manager:
        condition: service_started
      frontend-director:
        condition: service_started
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    environment:
      CADDY_API_DOMAIN: ${CADDY_API_DOMAIN:-}
      CADDY_MANAGER_DOMAIN: ${CADDY_MANAGER_DOMAIN:-}
      CADDY_DIRECTOR_DOMAIN: ${CADDY_DIRECTOR_DOMAIN:-}
      CADDY_LANDING_DOMAIN: ${CADDY_LANDING_DOMAIN:-}
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_TRANSCRIPTION_MODEL: ${GROQ_TRANSCRIPTION_MODEL:-whisper-large-v3-turbo}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_SUMMARY_MODEL: ${MISTRAL_SUMMARY_MODEL:-mistral-small-latest}
      MANGO_VPBX_API_KEY: ${MANGO_VPBX_API_KEY:-}
      MANGO_VPBX_API_SALT: ${MANGO_VPBX_API_SALT:-}
      MANGO_BASE_URL: ${MANGO_BASE_URL:-https://app.mango-office.ru}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-jwtusers}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    expose:
      - "3000"
    volumes:
      - backend_uploads:/app/uploads

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  frontend-manager:
    build:
      context: ./frontend-manager
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-frontend-manager
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_BASE_URL: ${FRONTEND_MANAGER_VITE_BASE_URL:-http://backend:3000}
      VITE_TIMEOUT: ${VITE_TIMEOUT:-10000}
    expose:
      - "3000"

  frontend-director:
    build:
      context: ./frontend-director
    container_name: ${COMPOSE_PROJECT_NAME:-jwtusers}-frontend-director
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_BASE_URL: ${FRONTEND_DIRECTOR_VITE_BASE_URL:-http://backend:3000}
      VITE_TIMEOUT: ${VITE_TIMEOUT:-10000}
    expose:
      - "3000"

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:
  minio_data:
